services:
  migrate:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    restart: "no"
    environment:
      APP_ENV: production
      REPOSITORY_BACKEND: postgres
      RATE_LIMIT_BACKEND: redis
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://vigia:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/vigia}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?set ALLOWED_ORIGINS as a JSON array, e.g. ["https://pdc.example.com"]}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in the environment}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:?set REFRESH_TOKEN_SECRET in the environment}
      METRICS_TOKEN: ${METRICS_TOKEN:?set METRICS_TOKEN in the environment}
      EDGE_WORKER_CLIENT_ID: ${EDGE_WORKER_CLIENT_ID:?set EDGE_WORKER_CLIENT_ID in the environment}
      EDGE_WORKER_API_KEY: ${EDGE_WORKER_API_KEY:?set EDGE_WORKER_API_KEY in the environment}
      INCIDENT_NOTIFICATION_ENABLED: ${INCIDENT_NOTIFICATION_ENABLED:-false}
      INCIDENT_NOTIFICATION_MODE: ${INCIDENT_NOTIFICATION_MODE:-mock}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      NOTIFICATION_FROM: ${NOTIFICATION_FROM:-alerts@vigia.local}
      INCIDENT_NOTIFICATION_RECIPIENTS: '${INCIDENT_NOTIFICATION_RECIPIENTS:-["ops@vigia.local"]}'
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      ALLOW_INTERNAL_S3_ENDPOINT: ${ALLOW_INTERNAL_S3_ENDPOINT:-true}
      S3_REGION: ${S3_REGION:-us-east-1}
      EVIDENCE_BUCKET_NAME: ${EVIDENCE_BUCKET_NAME:-evidence-private}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?set MINIO_ACCESS_KEY or S3_ACCESS_KEY_ID}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY or S3_SECRET_ACCESS_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: ["alembic", "upgrade", "head"]

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      APP_ENV: production
      REPOSITORY_BACKEND: postgres
      RATE_LIMIT_BACKEND: redis
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://vigia:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/vigia}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?set ALLOWED_ORIGINS as a JSON array, e.g. ["https://pdc.example.com"]}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in the environment}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:?set REFRESH_TOKEN_SECRET in the environment}
      METRICS_TOKEN: ${METRICS_TOKEN:?set METRICS_TOKEN in the environment}
      EDGE_WORKER_CLIENT_ID: ${EDGE_WORKER_CLIENT_ID:?set EDGE_WORKER_CLIENT_ID in the environment}
      EDGE_WORKER_API_KEY: ${EDGE_WORKER_API_KEY:?set EDGE_WORKER_API_KEY in the environment}
      INCIDENT_NOTIFICATION_ENABLED: ${INCIDENT_NOTIFICATION_ENABLED:-false}
      INCIDENT_NOTIFICATION_MODE: ${INCIDENT_NOTIFICATION_MODE:-mock}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      NOTIFICATION_FROM: ${NOTIFICATION_FROM:-alerts@vigia.local}
      INCIDENT_NOTIFICATION_RECIPIENTS: '${INCIDENT_NOTIFICATION_RECIPIENTS:-["ops@vigia.local"]}'
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      ALLOW_INTERNAL_S3_ENDPOINT: ${ALLOW_INTERNAL_S3_ENDPOINT:-true}
      S3_REGION: ${S3_REGION:-us-east-1}
      EVIDENCE_BUCKET_NAME: ${EVIDENCE_BUCKET_NAME:-evidence-private}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?set MINIO_ACCESS_KEY or S3_ACCESS_KEY_ID}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY or S3_SECRET_ACCESS_KEY}
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

  scheduler:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: production
      REPOSITORY_BACKEND: postgres
      RATE_LIMIT_BACKEND: redis
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://vigia:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/vigia}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?set ALLOWED_ORIGINS as a JSON array, e.g. ["https://pdc.example.com"]}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in the environment}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:?set REFRESH_TOKEN_SECRET in the environment}
      METRICS_TOKEN: ${METRICS_TOKEN:?set METRICS_TOKEN in the environment}
      EDGE_WORKER_CLIENT_ID: ${EDGE_WORKER_CLIENT_ID:?set EDGE_WORKER_CLIENT_ID in the environment}
      EDGE_WORKER_API_KEY: ${EDGE_WORKER_API_KEY:?set EDGE_WORKER_API_KEY in the environment}
      INCIDENT_NOTIFICATION_ENABLED: ${INCIDENT_NOTIFICATION_ENABLED:-false}
      INCIDENT_NOTIFICATION_MODE: ${INCIDENT_NOTIFICATION_MODE:-mock}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      ALLOW_INTERNAL_S3_ENDPOINT: ${ALLOW_INTERNAL_S3_ENDPOINT:-true}
      S3_REGION: ${S3_REGION:-us-east-1}
      EVIDENCE_BUCKET_NAME: ${EVIDENCE_BUCKET_NAME:-evidence-private}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?set MINIO_ACCESS_KEY or S3_ACCESS_KEY_ID}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY or S3_SECRET_ACCESS_KEY}
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    command: ["python", "-m", "vigia_api.scripts.jobs_scheduler"]

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    expose:
      - "80"
    depends_on:
      api:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vigia}
      POSTGRES_USER: ${POSTGRES_USER:-vigia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-vigia} -d $${POSTGRES_DB:-vigia}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-${MINIO_ACCESS_KEY:?set MINIO_ACCESS_KEY}}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY}}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set pdc http://minio:9000 "$${MINIO_ROOT_USER:-$${MINIO_ACCESS_KEY:-$${S3_ACCESS_KEY_ID}}}" "$${MINIO_ROOT_PASSWORD:-$${MINIO_SECRET_KEY:-$${S3_SECRET_ACCESS_KEY}}}" &&
        (mc mb -p pdc/$${EVIDENCE_BUCKET_NAME:-evidence-private} || true) &&
        mc anonymous set none pdc/$${EVIDENCE_BUCKET_NAME:-evidence-private}
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-${MINIO_ACCESS_KEY:?set MINIO_ACCESS_KEY}}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY}}
      EVIDENCE_BUCKET_NAME: ${EVIDENCE_BUCKET_NAME:-evidence-private}

volumes:
  postgres-data:
  redis-data:
  minio-data:
